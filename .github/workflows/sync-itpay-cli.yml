name: Sync ItPay CLI bundle

on:
  schedule:
    - cron: "53 * * * *"
  workflow_dispatch:

jobs:
  sync:
    uses: itpay-ai/cli/.github/workflows/sync-platform-bundle.yml@main
    permissions:
      contents: write
      pull-requests: write
    with:
      bundle-format: single-file-esm
      bundle-directory: assets/itpay-cli
      version-files: package.json
      track-skill-diff: true
